id: no-builtins-current-system
language: nix
severity: error
message: "builtins.currentSystem is impure. Pass system explicitly via flake or function args."
note: |
  WHY: builtins.currentSystem reads the host architecture at eval time, breaking
  cross-compilation and making evaluation results depend on which machine runs
  the eval. Flakes explicitly forbid it in pure mode.
  NIXPKGS: Yes — nixpkgs never uses builtins.currentSystem internally. The system
  is always threaded through function arguments. nix.dev best practices warn against it.
  REPO: Banned in AGENTS.md.
rule:
  pattern: builtins.currentSystem
