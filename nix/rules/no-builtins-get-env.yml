id: no-builtins-get-env
language: nix
severity: error
message: "builtins.getEnv is impure. Pass values explicitly via function args or flake inputs."
note: |
  WHY: builtins.getEnv reads environment variables at eval time, making evaluation
  results depend on the caller's shell environment. This breaks reproducibility,
  caching, and CI — different users get different builds from the same source.
  NIXPKGS: Yes — never used in nixpkgs package expressions. Flakes forbid it in
  pure mode.
  REPO: Banned in AGENTS.md.
rule:
  pattern: builtins.getEnv $ARG
