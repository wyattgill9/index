id: no-mkforce
language: nix
severity: error
message: "mkForce is banned. Use priority composition (mkDefault, mkOverride) instead."
note: |
  WHY: mkForce overrides ALL other definitions regardless of priority, making
  module composition unpredictable. It hides conflicts instead of resolving them.
  NIXPKGS: Yes — nixpkgs discourages mkForce and prefers explicit mkOverride
  with a priority number or better module ownership boundaries.
  REPO: Banned in AGENTS.md. Prefer priority composition or fixing the module boundary.
rule:
  pattern: mkForce
