id: no-path-flake-ref
language: nix
severity: error
message: "`path:` flake refs copy the entire working tree byte-for-byte. Use `.#...`, `git+file:///abs/path`, or a proper flake input."
note: |
  WHY: `path:/abs/path` and `path:.` tell Nix to copy the entire tree — including
  gitignored files like target/ (hundreds of GB), sockets, FIFOs, and other
  non-regular files. This either hangs the fetch or fails with "unsupported type"
  errors. Dirty trees also disable the eval cache.
  NIXPKGS: Not an anti-pattern there (nixpkgs doesn't write flake refs), but this is
  an IX-specific trap: our target/ directory is ~400 GB, and sockets appear in it
  during development.
  REPO: Banned in AGENTS.md. Alternatives:
    - `.#pkg` (inside the repo; respects git)
    - `git+file:///home/andrew/ix?submodules=1#pkg` (absolute; respects git)
    - flake inputs in `flake.nix`
rule:
  pattern: '"$X"'
  regex: '^"path:(/|\.)'
