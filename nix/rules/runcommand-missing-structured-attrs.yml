id: runcommand-missing-structured-attrs
language: nix
severity: warning
message: "runCommand with empty attrs {}. Add { __structuredAttrs = true; } for consistent derivation behavior."
note: |
  WHY: __structuredAttrs changes how derivation attributes are passed to the builder —
  as a JSON file instead of environment variables. This avoids env-var length limits,
  preserves types (lists, nested attrs), and is the modern Nix convention. Inconsistent
  usage across a repo causes confusing differences in how $out, arrays, etc. behave
  in build scripts.
  NIXPKGS: Not yet enforced — but __structuredAttrs is the direction nixpkgs is moving.
  New nixpkgs code increasingly uses it.
  REPO: Required by AGENTS.md on all derivations and runCommand.
rule:
  pattern: pkgs.runCommand $NAME {} $BODY
