id: no-impure
language: nix
severity: warning
message: "__impure = true: prefer writeShellApplication for side-effect orchestrators (push, webhook). __impure is only for network side effects that must live inside the derivation graph."
note: |
  WHY: Impure derivations break reproducibility by allowing unrestricted network
  and filesystem access during builds. They cannot be cached reliably.
  WHEN OK: the output is inherently non-reproducible (push, webhook, mirror sync)
  AND must be consumed by another derivation as an input. If a shell script runner
  would work (e.g. the side effect is the final step in a pipeline), use
  writeShellApplication and expose via `nix run` instead.
  PREFER: FODs for network fetch, __mounts for sandbox mounts,
  writeShellApplication for orchestrators.
rule:
  pattern: __impure = true
