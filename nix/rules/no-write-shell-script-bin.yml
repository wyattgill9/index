id: no-write-shell-script-bin
language: nix
severity: error
message: "writeShellScriptBin is banned. Use writeShellApplication instead."
note: |
  WHY: writeShellScriptBin produces a script without shellcheck validation, without
  'set -euo pipefail', and without declared runtime dependencies. writeShellApplication
  adds all three, catching bugs at build time instead of runtime.
  NIXPKGS: Yes — nixpkgs#208242 tracks this. nixpkgs-hammering does not flag it yet
  but the community consensus is clear. New code should use writeShellApplication.
  REPO: Banned in AGENTS.md.
rule:
  pattern: writeShellScriptBin
