id: no-fake-hash
language: nix
severity: error
message: "Fake hashes are banned. Compute the real SRI hash before editing tracked Nix files."
note: |
  WHY: Fake hashes turn normal edits into build-and-copy loops, encourage impure
  scratch commands, and leave broken fixed-output derivations in the tree when
  the mismatch flow is interrupted. Hash discovery belongs in a scratch command;
  repo-owned Nix files must contain the final SRI value.
  REPO: Banned in AGENTS.md.
rule:
  any:
    - pattern: lib.fakeHash
    - pattern: pkgs.lib.fakeHash
    - pattern: lib.fakeSha256
    - pattern: pkgs.lib.fakeSha256
    - pattern: lib.fakeSha512
    - pattern: pkgs.lib.fakeSha512
    - pattern: '"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="'
