id: mkderivation-missing-strict-deps
language: nix
severity: warning
message: "mkDerivation without strictDeps = true. Add it to prevent build/host dependency leaking."
note: |
  WHY: Without strictDeps, nativeBuildInputs (build-time tools like cmake, pkg-config)
  leak into the host closure, and buildInputs (host libraries) leak into the build
  environment. This causes silent cross-compilation failures and bloated closures.
  strictDeps enforces proper separation.
  NIXPKGS: Yes — nixpkgs#253154 tracks enabling strictDeps globally. It's already
  the default for some builders (buildPythonPackage, buildGoModule). nixpkgs CI
  is moving toward requiring it.
  REPO: Required by AGENTS.md on repo-owned derivations.
rule:
  pattern: pkgs.stdenv.mkDerivation { $$$ATTRS }
  all:
    - not:
        has:
          pattern: strictDeps
          stopBy: end
