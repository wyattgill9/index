id: no-with-pkgs
language: nix
severity: error
message: "File-scope 'with pkgs;' is banned. Use explicit pkgs.foo qualifications."
note: |
  WHY: Same as 'with lib;' — pollutes the scope, breaks tooling, hides where
  names come from. Even harder to audit than 'with lib;' because pkgs has
  thousands of attributes.
  NIXPKGS: Yes — same consensus as with-lib. Scoped 'with' in tiny list literals
  (buildInputs = with pkgs; [ ... ]) is tolerated in nixpkgs but discouraged here.
  REPO: Banned in AGENTS.md.
rule:
  pattern: with pkgs; $$$BODY
