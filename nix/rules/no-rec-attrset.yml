id: no-rec-attrset
language: nix
severity: error
message: "'rec { }' is banned in derivations and overlays. Use let, finalAttrs:, or final/prev."
note: |
  WHY: rec allows forward references but creates a fixed point over the entire
  attrset, making overrideAttrs and overlays behave unexpectedly — overridden
  attributes don't propagate to other attrs that reference them.
  NIXPKGS: Yes — nixpkgs#315337 tracks migration from rec to finalAttrs in
  mkDerivation. nixpkgs-hammering flags this. nix.dev best practices explicitly
  warn against rec and recommend let...in or self-reference patterns.
  REPO: Banned in AGENTS.md. Use let, finalAttrs:, or final/prev.
rule:
  pattern: rec { $$$BODY }
