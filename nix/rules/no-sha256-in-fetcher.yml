id: no-sha256-in-fetcher
language: nix
severity: warning
message: "Use 'hash' instead of 'sha256' in fetchers. 'hash' accepts SRI format and is forward-compatible."
note: |
  WHY: The 'sha256' attribute is the legacy way to specify fetcher hashes. The
  modern 'hash' attribute accepts SRI-format hashes (sha256-xxx=) which are
  self-describing (the algorithm is embedded in the value), forward-compatible
  with other hash algorithms, and unambiguous about encoding (always base64).
  NIXPKGS: Yes — nixpkgs#310373 tracks migration. nixpkgs reviewers routinely
  request 'hash' over 'sha256'. Community consensus is strong and CI linting
  is planned (nixpkgs#410468).
  REPO: Preferred by convention. Use hash = "sha256-...=" SRI format.
rule:
  pattern: sha256 = $VAL
