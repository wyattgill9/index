id: no-root-string-interp
language: nix
severity: error
message: "`\"${root}/...\"` string-interpolates the workspace tree into a string, leaking full-tree context. Use `root + \"/...\"` (path concat) or `builtins.path { name = \"...\"; path = root + \"/...\"; }` (stage a subpath into its own store dir)."
note: |
  WHY: When `root` is a workspace path (the whole repo tree), `"${root}/sub"` is a
  string whose Nix context tracks the unfiltered tree. If that string ends up in a
  derivation env / arg / command, every per-unit drv downstream depends on the
  narHash of the entire tree. A drive-by edit to docs/, README, or .claude/ then
  invalidates every rust build. This was the root cause of the 508-drv cascade
  fixed in 162cda9a39 (leak was in rust-musl.nix: `muslToolchainFile =
  "${root}/nix/cmake/musl-cross.cmake"`).
  REPO: Two safe alternatives:
    1. `root + "/sub"` — path concatenation. Produces a proper Nix path, sandbox
       handles context correctly, no full-tree string context. Use this when the
       result is consumed at Nix eval time (e.g. `import`, `readFile`,
       `pkgs.rustPlatform.importCargoLock { lockFile = ...; }`).
    2. `builtins.path { name = "<single-name>"; path = root + "/sub"; }` — stages
       just the subpath into a dedicated store path. Use this when the path ends
       up in a derivation's env / args / shell command, so the drv only depends
       on the staged subpath's content.
rule:
  any:
    - pattern: '"${root}$$$REST"'
    - pattern: '"${workspaceRoot}$$$REST"'
