id: no-getflake-tostring
language: nix
severity: error
message: "`builtins.getFlake (toString ./...)` uses path-flake semantics — copies the entire tree including non-regular files. Use `\"git+file:///...\"` instead."
note: |
  WHY: `toString ./.` produces a plain filesystem path. `builtins.getFlake` on a
  plain path uses path-flake semantics, which copies the working tree byte-for-byte.
  For us that means 400 GB of `target/`, plus sockets / FIFOs that hit
  "unsupported type" errors. Same trap as the `path:` flake ref, just obscured behind
  `toString`.
  REPO: Use `builtins.getFlake "git+file:///abs/path?submodules=1"` when you genuinely
  need `getFlake` at eval time. Most cases want a flake input or a `.#attr` invocation
  via `nix build` / `nix eval` instead.
rule:
  any:
    - pattern: builtins.getFlake (toString $X)
    - pattern: getFlake (toString $X)
