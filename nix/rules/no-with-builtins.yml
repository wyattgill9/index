id: no-with-builtins
language: nix
severity: error
message: "'with builtins;' is banned. Use explicit builtins.foo qualifications."
note: |
  WHY: Same scope pollution as 'with lib;'. Also risky because builtins names
  can shadow local bindings silently (e.g. 'map', 'filter', 'head', 'tail').
  NIXPKGS: Yes — same consensus. nix.dev best practices explicitly warn against it.
  REPO: Banned in AGENTS.md.
rule:
  pattern: with builtins; $$$BODY
