id: no-import-in-imports
language: nix
severity: error
message: "Use 'imports = [ ./foo.nix ]', not 'imports = [ (import ./foo.nix) ]'. NixOS modules auto-import paths."
note: |
  WHY: NixOS module system's 'imports' list accepts raw paths — it calls 'import'
  internally. Wrapping with (import ./foo.nix) bypasses the module system's
  deduplication, error reporting, and location tracking. It also prevents the
  module system from detecting circular imports.
  NIXPKGS: Yes — this is a well-known anti-pattern in NixOS modules. The module
  system documentation explicitly says to use paths, not import calls.
  REPO: Banned in AGENTS.md.
rule:
  pattern: imports = [ $$$PRE (import $PATH) $$$POST ]
