id: no-nixpkgs-channel-ref
language: nix
severity: error
message: "'<nixpkgs>' channel reference is banned. Use flake inputs."
note: |
  WHY: Angle-bracket paths (<nixpkgs>) depend on NIX_PATH, an impure global
  mutable environment variable. This makes builds non-reproducible — different
  machines or users get different nixpkgs versions. It also breaks pure evaluation
  and flake-based workflows.
  NIXPKGS: Yes — nixpkgs CI explicitly checks for <nixpkgs> self-references
  (see ci/nixpkgs-vet.nix). nix.dev best practices warn against it.
  REPO: Banned in AGENTS.md. Use flake inputs for all nixpkgs references.
rule:
  pattern: <nixpkgs>
