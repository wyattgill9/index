id: no-with-lib
language: nix
severity: error
message: "File-scope 'with lib;' is banned. Use explicit lib.foo qualifications."
note: |
  WHY: 'with lib;' dumps hundreds of names into scope, causing ambiguity for
  readers and breaking language servers (nixd, nil) that cannot resolve bindings
  through 'with'. It also makes it impossible to tell at a glance whether a name
  comes from lib, pkgs, or a local binding.
  NIXPKGS: Yes — widely agreed anti-pattern (nixpkgs#387072). CI linting is planned
  (nixpkgs#410468). The nixpkgs formatting team and Steering Committee endorse
  writing it out of new code.
  REPO: Banned in AGENTS.md. Use explicit lib.foo prefixes.
rule:
  pattern: with lib; $$$BODY
