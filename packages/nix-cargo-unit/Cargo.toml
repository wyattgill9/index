[package]
name = "nix-cargo-unit"
version = "0.1.0"
edition = "2024"
description = "Render Cargo unit graphs as composable Nix derivations"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
color-eyre = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
