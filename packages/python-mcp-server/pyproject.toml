[project]
name = "ix-python-mcp"
version = "0.1.0"
description = "MCP tools for a persistent Python session"
requires-python = ">=3.13"
dependencies = [
    "mcp>=1.20.0,<2.0.0",
]

[project.scripts]
ix-python-mcp = "ix_python_mcp:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
